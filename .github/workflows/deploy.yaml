name: Build server and deploy to host

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      server-binary: ${{ steps.server-binary-upload-step.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4
      - run: cargo build -r
      - uses: actions/upload-artifact@v4
        id: server-binary-upload-step
        with:
          name: alts-alt_server
          path: target/release/alts-alt_server
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - env:
          SERVER_BINARY_ARTIFACT_ID: ${{ needs.build.outputs.server-binary }}
        run: 
          "echo \"Server binary artifact ID: $SERVER_BINARY_ARTIFACT_ID\""

