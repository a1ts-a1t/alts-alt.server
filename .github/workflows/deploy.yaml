name: Deploy server to host

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build executable
        run: cargo build -r

      - name: Publish executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: server
          path: target/release/alts-alt_server
          if-no-files-found: error
          overwrite: true
        
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4

      - name: Initialize ssh
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.HOST_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST_NAME }} > ~/.ssh/known_hosts

      - name: Sync server executable
        run: rsync -av --delete server/alts-alt_server ${{ secrets.HOST_USERNAME }}@${{ secrets.HOST_NAME }}:~/alts-alt.server

      - name: Rebuild and restart server
        run: |
          ssh ${{ secrets.HOST_USERNAME}}@${{ secrets.HOST_NAME }} < scripts/deploy.sh

