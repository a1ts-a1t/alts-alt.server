name: Build server and deploy to host

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo build -r
      - uses: actions/upload-artifact@v4
        with:
          name: alts-alt_server
          path: target/release/alts-alt_server
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: ssh-init
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.HOST_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST_NAME }} > ~/.ssh/known_hosts
      - uses: actions/download-artifact@v4
        with:
          name: alts-alt_server
      - run: rsync -vv -p --chmod=F744 alts-alt_server ${{ secrets.HOST_USERNAME }}@${{ secrets.HOST_NAME }}:~/alts-alt.server

